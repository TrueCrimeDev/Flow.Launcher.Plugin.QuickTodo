name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish plugin
        shell: pwsh
        run: dotnet publish .\Flow.Launcher.Plugin.QuickTodo.csproj -c Release -o .\artifacts\QuickTodo

      - name: Pack plugin
        shell: pwsh
        run: Compress-Archive -Path .\artifacts\QuickTodo\* -DestinationPath .\Flow.Launcher.Plugin.QuickTodo.zip -Force

      - name: Create release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" .\Flow.Launcher.Plugin.QuickTodo.zip --title "${{ github.ref_name }}" --generate-notes
